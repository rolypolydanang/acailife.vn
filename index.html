<!DOCTYPE html>
<html lang="en">

    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font: 16px 'Inter', Arial, sans-serif; background: #111111; color: #fff; overflow-x: hidden; }

        /* TICKER - Fixed at top */
        .ticker { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #111111; border-bottom: 1px solid #fff; display: flex; align-items: center; overflow: hidden; z-index: 100; pointer-events: none; }
        .track { display: flex; white-space: nowrap; animation: scroll 22s linear infinite; }
        .track span { padding-right: 80px; font: 700 24px 'Inter'; text-transform: uppercase; }
        @keyframes scroll { to { transform: translateX(-50%); } }

        /* LOGO - Scrolls with page, 80px top margin matches location page */
        .logo-container { 
            display: block;
            margin: 80px auto 40px auto; 
            width: 80vw; 
            max-width: 800px; 
            text-align: center;
        }
        .logo-container img { width: 100%; display: block; filter: drop-shadow(0 20px 40px rgba(0,0,0,.35)); }

        /* HERO */
        .hero { width: 100%; height: 100vh; overflow: hidden; }
        .hero-bg { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        
        /* FOOTER */
        .footer { background-color: #f5f1ea !important; color: #111111 !important; padding: 100px 0; text-transform: uppercase; letter-spacing: 1px; }
        .footer-inner { max-width: 1200px; margin: auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .nav { display: flex; flex-direction: column; gap: 18px; }
        .footer a { color: inherit; text-decoration: none; }
        .nav a { font: 700 28px 'Inter'; }
        .nav a:hover { opacity: .5; }
        .f-right { max-width: 420px; margin-left: auto; text-align: right; display: flex; flex-direction: column; justify-content: space-between; }
        .f-info h2 { font-size: 20px; margin-bottom: 18px; }
        .f-info p { font-size: 14px; line-height: 1.8; margin-bottom: 18px; }
        .f-social { display: flex; justify-content: flex-end; gap: 28px; margin-top: 30px; }
        .f-social a { font-size: 34px; transition: 0.25s; }
        .f-social a:hover { transform: translateY(-3px); opacity: .5; }

        @media(max-width: 768px) {
            .logo-container { margin: 80px auto 40px auto; width: 90% !important; max-width: 350px !important; }
            .footer-inner { grid-template-columns: 1fr; padding: 0 20px; gap: 60px; }
            .f-right { text-align: left; margin: 0; }
            .f-social { justify-content: flex-start; }
        }
    </style>
</head>
