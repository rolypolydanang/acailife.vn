<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acai Life</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0f0f0f;--w:#fff;--s:#f5f1ea;--m:1200px}
body{font:16px Arial,sans-serif;background:var(--b);color:var(--w);overflow-x:hidden}

/* Ticker */
.ticker{position:fixed;top:0;left:0;width:100%;height:60px;background:#000;border:1px solid #fff;border-left:0;border-right:0;display:flex;align-items:center;overflow:hidden;z-index:99}
.ticker-track{display:flex;white-space:nowrap;width:max-content;animation:scroll 22s linear infinite;will-change:transform}
.ticker-track span{padding-right:80px;font:700 24px Arial;text-transform:uppercase;letter-spacing:1.5px}
@keyframes scroll{to{transform:translateX(-50%)}}

/* Hero */
.hero{margin-top:60px;height:calc(100vh - 60px);position:relative;overflow:hidden}
.hero-bg{width:100%;height:100%;object-fit:cover;transform:scale(1.02)}

/* Logo: Centered horizontally, 5% from top */
.hero-logo-container{
position:absolute;
top:5%;
left:50%;
transform:translateX(-50%);
text-align:center;
}

.hero-overlay-logo{
width:70vw;
max-width:950px;
min-width:220px;
filter:drop-shadow(0 20px 40px rgba(0,0,0,.35));
}

/* Buttons: Aligned with the top of the logo area */
.hero-buttons{
position:absolute;
top: 5%;
right:50px;
display:flex;
flex-direction:column;
gap:16px;
}

.hero-buttons a{
padding:12px 30px;
border:1px solid var(--w);
color:#000;
background:var(--w);
text-decoration:none;
text-transform:uppercase;
letter-spacing:1.5px;
font:700 24px Arial;
transition:.3s ease;
display:inline-block;
text-align:center;
min-width:200px;
border-radius:50px;
}

.hero-buttons a:hover{
background:#000;
color:var(--w);
border-color:#000;
transform:translateY(-2px);
}

/* Footer */
.footer{background:var(--s);color:#000;padding:100px 0;text-transform:uppercase;letter-spacing:1px}
.footer-inner{max-width:var(--m);margin:auto;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:80px}
.footer-nav{display:flex;flex-direction:column;gap:18px}
.footer a{color:inherit;text-decoration:none}
.footer-nav a{font:700 28px Arial}
.footer-nav a:hover,.footer-social a:hover{opacity:.5}
.footer-right{max-width:420px;margin-left:auto;text-align:right;display:flex;flex-direction:column;justify-content:space-between}
.footer-info h2{font-size:20px;margin-bottom:18px}
.footer-info p{font-size:14px;line-height:1.8;margin-bottom:18px}
.footer-social{display:flex;justify-content:flex-end;gap:28px;margin-top:30px}
.footer-social a{font-size:34px;transition:.25s}
.footer-social a:hover{transform:translateY(-3px)}

@media(max-width:768px){
.hero{height:100svh}
.hero-logo-container{
    top:35%;
    transform:translate(-50%,-50%);
}
.hero-overlay-logo{width:90vw;max-width:none;min-width:0}
/* Move buttons under logo for mobile */
.hero-buttons{
    position:relative;
    top:auto;
    right:auto;
    margin-top:40px;
    align-items:center;
}
.footer-inner{grid-template-columns:1fr;padding:0 20px;gap:60px}
.footer-right{text-align:left;margin:0}
.footer-social{justify-content:flex-start;flex-wrap:wrap}

.hero-buttons a{
    width:200px; 
    min-width:200px;
    text-align:center; 
    font-size:24px; 
    padding:10px 16px;
}
}
</style>
</head>

<body>

<div class="ticker">
<div class="ticker-track">
<span>AUTHENTIC AÇAÍ</span><span>FROZEN YOGURT</span><span>PREMIUM TOPPINGS</span><span>ENERGISING SMOOTHIES</span><span>SPECIALTY COFFEE</span>
</div>
</div>

<section class="hero">
<div class="hero-logo-container">
<img src="images/acai-life-logo-hero.webp" class="hero-overlay-logo" alt="Acai Life">
</div>

<div class="hero-buttons">
<a href="https://maps.app.goo.gl/8EcqxysxVB3U9FvW9" target="_blank">Find Us</a>
<a href="/#" target="_blank">GrabFood</a>
</div>

</section>

<footer class="footer">
</footer>

</body>
</html>
