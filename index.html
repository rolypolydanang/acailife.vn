<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acai Life</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:#fff;
    overflow-x:hidden;
}

/* ==========================
   TOP SCROLLING BAR
========================== */

.ticker{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:34px;
    background:#000;
    overflow:hidden;
    border-top:2px solid #fff;
    border-bottom:2px solid #fff;
    z-index:999;
    display:flex;
    align-items:center;
}

.ticker-track{
    display:flex;
    width:max-content;
    animation:marquee 35s linear infinite;
}

.ticker-track span{
    white-space:nowrap;
    flex-shrink:0;
    font-size:15px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    padding-right:60px;
}

.ticker:hover .ticker-track{
    animation-play-state:paused;
}

@keyframes marquee{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }

}

/* ==========================
   HERO
========================== */

.hero{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#111;

    padding-top:34px;

}

.hero-logo{

    width:700px;

    max-width:85%;

    height:auto;

}

</style>

</head>

<body>

<div class="ticker">

<div class="ticker-track">

<span>AUTHENTIC BRAZILIAN AÇAÍ</span>
<span>TRADITIONAL FROZEN YOGURT</span>
<span>SPECIALTY COFFEE</span>
<span>PREMIUM TOPPINGS</span>
<span>FRESH FRUIT</span>

<span>AUTHENTIC BRAZILIAN AÇAÍ</span>
<span>TRADITIONAL FROZEN YOGURT</span>
<span>SPECIALTY COFFEE</span>
<span>PREMIUM TOPPINGS</span>
<span>FRESH FRUIT</span>

</div>

</div>

<section class="hero">

<img src="/images/ACAI LIFE LOGO LONG.webp"
     alt="Acai Life"
     class="hero-logo">

</section>

</body>

</html>
