<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acai Life | Authentic Açaí & Healthy Treats</title>
     
    <link rel="canonical" href="https://www.acailife.vn/">
    <meta name="description" content="Acai Life Da Nang: Serving authentic Açaí bowls, frozen yogurt, and healthy treats in An Thượng, Ngũ Hành Sơn. Open daily 10am-10pm.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <style>
        :root {
            --bg: #111111;
            --text: #ffffff;
            --accent: #f5f1ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; 
            /* Ensures no unwanted overflow */
            overflow-x: hidden; 
        }
 
        body { 
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', Arial, sans-serif;
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
            min-height: 100svh;
        }

        main { flex: 1; display: flex; flex-direction: column; }

        /* 1. TICKER */
        .ticker { 
            flex-shrink: 0; 
            height: 60px; 
            background: #000; 
            border-bottom: 1px solid #fff; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
            z-index: 1000; 
        }
        .track { display: flex; white-space: nowrap; animation: scroll 20s linear infinite; }
        .track span { padding-right: 80px; font-weight: 700; font-size: 24px; text-transform: uppercase; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* 2. HERO - Optimized for mobile and desktop */
        .hero { 
            width: 100%; 
            /* Subtracting 60px ticker height from total viewport height */
            height: calc(100vh - 60px); 
            height: calc(100svh - 60px);
            position: relative; 
            background: #1a1a1a;
            overflow: hidden;
        }
        .hero-bg { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .logo-container { 
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%); 
            z-index: 50; width: 80vw; max-width: 800px; 
        }
        .logo-container img { width: 100%; display: block; filter: drop-shadow(0 20px 40px rgba(0,0,0,.35)); }

        /* 3. FOOTER */
        .footer { background-color: var(--accent); color: #111111; padding: 100px 0; text-transform: uppercase; letter-spacing: 1px; }
        .footer-inner { max-width: 1200px; margin: auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        
        .footer a { color: inherit; text-decoration: none; transition: opacity 0.25s ease; cursor: pointer; }
        .footer a:hover { opacity: .5; }
        
        .nav { display: flex; flex-direction: column; gap: 24px; }
        .nav a { font: 700 28px 'Inter'; display: block; padding: 8px 0; width: fit-content; transition: transform 0.3s ease, opacity 0.3s ease; }
        .nav a:hover { transform: translateX(10px); opacity: .6; }
        
        .f-right { max-width: 420px; margin-left: auto; text-align: right; display: flex; flex-direction: column; justify-content: space-between; }
        .f-info h2 { font-size: 20px; margin-bottom: 18px; display: inline-block; }
        .f-info p { font-size: 14px; line-height: 1.8; margin-bottom: 18px; }
        
        .f-social { display: flex; justify-content: flex-end; gap: 28px; margin-top: 30px; }
        .f-social a { font-size: 34px; padding: 12px; }

        @media(max-width: 768px) {
            .logo-container { width: 90%; max-width: 350px; top: 30px; }
            .footer-inner { grid-template-columns: 1fr; gap: 60px; padding: 0 20px; }
            .f-right { text-align: left; margin: 0; }
            .f-social { justify-content: flex-start; }
            .nav { gap: 16px; }
        }
    </style>
</head>
<body>

    <header class="ticker" aria-hidden="true">
        <div class="track" id="ticker-track">
            <span>AUTHENTIC AÇAÍ</span><span>FROZEN YOGURT</span><span>PREMIUM TOPPINGS</span><span>ENERGISING SMOOTHIES</span><span>SPECIALTY COFFEE</span>
        </div>
    </header>

    <main>
        <section class="hero">
            <a href="/" class="logo-container" aria-label="Home">
                <img src="/images/acai-life-logo-hero.webp" alt="Acai Life Logo">
            </a>
            <picture>
                <img src="/images/acai-life-index-image.webp" class="hero-bg" alt="Fresh acai bowl" fetchpriority="high" loading="eager">
            </picture>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <nav class="nav">
                <a href="#">MENU</a>
                <a href="location.html">LOCATION</a>
                <a href="about.html">ABOUT</a>
                <a href="#">WHOLESALE</a>
                <a href="#">BLOG</a>
            </nav>
            <div class="f-right">
                <div class="f-info">
                    <a href="/"><h2>ACAI LIFE - ACAI BOWLS & FROZEN YOGURT</h2></h2></a>
                    <p>05 AN THƯỢNG 6, BẮC MỸ PHÚ,<br>NGŨ HÀNH SƠN, ĐÀ NẴNG 550000, VIETNAM</p>
                    <p>MON-SUN: 10:00 - 22:00</p>
                    <p><a href="tel:+84394303001" aria-label="Call us">+84 394 303 001</a><br>
                    <a href="mailto:acailife.vn@gmail.com" aria-label="Email us">ACAILIFE.VN@GMAIL.COM</a></p>
                </div>
                <div class="f-social">
                    <a href="https://www.facebook.com/acailifevn" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/acailife.vn" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@acailife.vn" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="https://maps.app.goo.gl/8EcqxysxVB3U9FvW9" target="_blank" aria-label="Location Map"><i class="fa-solid fa-location-dot"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const track = document.getElementById('ticker-track');
        const content = track.innerHTML;
        track.innerHTML += content + content;
    </script>
</body>
</html>
