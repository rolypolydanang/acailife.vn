<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scrolling Header</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:Arial, Helvetica, sans-serif;
    color:#fff;
}

/* TOP BAR */
.ticker{
    width:100%;
    height:42px;
    background:#000;
    overflow:hidden;
    display:flex;
    align-items:center;
    border-top:2px solid #fff;
    border-bottom:2px solid #fff;
}

/* Moving track */
.ticker-track{
    display:flex;
    width:max-content;
    animation:scroll 30s linear infinite;
}

/* Text */
.ticker-track span{
    flex-shrink:0;
    font-size:20px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    padding-right:50px;
    white-space:nowrap;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

/* Pause on hover */
.ticker:hover .ticker-track{
    animation-play-state:paused;
}

/* Demo hero */
.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="ticker">
    <div class="ticker-track">

        <span>AUTHENTIC BRAZILIAN AÇAÍ</span>
        <span>TRADITIONAL FROZEN YOGURT</span>
        <span>PREMIUM TOPPINGS</span>
        <span>ENERGISING SMOOTHIES</span>
        <span>SPECIALTY COFFEE</span>



        <!-- Duplicate for seamless looping -->

        <span>AUTHENTIC BRAZILIAN AÇAÍ</span>
        <span>TRADITIONAL FROZEN YOGURT</span>
        <span>PREMIUM TOPPINGS</span>
        <span>ENERGISING SMOOTHIES</span>
        <span>SPECIALTY COFFEE</span>

    </div>
</div>

<div class="hero">
    ACAI LIFE
</div>

</body>
</html>
