<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acai Life</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0f0f0f;--w:#fff;--s:#f5f1ea}
body{font:16px Arial,sans-serif;background:var(--b);color:var(--w);overflow-x:hidden}

.ticker{position:fixed;top:0;left:0;width:100%;height:60px;background:#000;border:1px solid #fff;border-left:0;border-right:0;display:flex;align-items:center;overflow:hidden;z-index:99}
.ticker-track{display:flex;white-space:nowrap;width:max-content;animation:scroll 22s linear infinite;will-change:transform}
.ticker-track span{padding-right:80px;font:700 24px Arial;text-transform:uppercase;letter-spacing:1.5px}
@keyframes scroll{to{transform:translateX(-50%)}}

/* AGGRESSIVE LAYOUT: Grid container ensures zero overlap */
.hero{
    margin-top:60px;
    height:calc(100vh - 60px);
    display:grid;
    grid-template-columns: 1fr minmax(auto, 800px) 250px;
    align-items: center;
    position:relative;
    padding: 0 20px;
}
.hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}

/* Logo column (center) */
.hero-logo-wrapper {
    grid-column: 2;
    display: flex;
    justify-content: center;
    z-index: 1;
}
.hero-overlay-logo{
    width: 100%;
    max-width:800px;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,.35));
}

/* Button column (right) */
.hero-buttons{
    grid-column: 3;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:2;
    padding-left: 20px;
}
.hero-buttons a{
    padding: 10px 20px;
    border:1px solid var(--w);
    color:#000;
    background:var(--w);
    text-decoration:none;
    text-transform:uppercase;
    font:700 16px Arial;
    border-radius:50px;
    text-align: center;
}

/* If screen is too narrow for 3 columns, hide buttons */
@media(max-width:1100px){
    .hero { grid-template-columns: 1fr; }
    .hero-buttons { display: none; }
}

/* Mobile Stacked */
@media(max-width:768px){
    .hero{ grid-template-columns: 1fr; align-content: center; }
    .hero-buttons{
        display: flex;
        grid-column: 1;
        margin-top: 30px;
        align-items: center;
    }
}

.footer{background:var(--s);color:#000;padding:100px 0;text-transform:uppercase;letter-spacing:1px}
.footer-inner{max-width:1200px;margin:auto;padding:0 32px;display:grid;grid-template-columns:1fr 1fr;gap:80px}
</style>
</head>

<body>
<div class="ticker">
    <div class="ticker-track">
        <span>AUTHENTIC AÇAÍ</span><span>FROZEN YOGURT</span><span>PREMIUM TOPPINGS</span><span>ENERGISING SMOOTHIES</span>
        <span>AUTHENTIC AÇAÍ</span><span>FROZEN YOGURT</span><span>PREMIUM TOPPINGS</span><span>ENERGISING SMOOTHIES</span>
    </div>
</div>

<section class="hero">
    <img src="/images/acai-life-index-image.webp" class="hero-bg" alt="">
    <div class="hero-logo-wrapper">
        <img src="images/acai-life-logo-hero.webp" class="hero-overlay-logo" alt="Acai Life">
    </div>
    <div class="hero-buttons">
        <a href="https://maps.app.goo.gl/8EcqxysxVB3U9FvW9" target="_blank">Find Us</a>
        <a href="/#" target="_blank">GrabFood</a>
    </div>
</section>

<footer class="footer">
    <div class="footer-inner">
        </div>
</footer>
</body>
</html>
