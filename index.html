<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acai Life | Authentic Açaí & Healthy Treats</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --b: #0f0f0f; --w: #fff; --s: #f5f1ea; --m: 1200px; }

        body { font: 16px 'Inter', Arial, sans-serif; background: var(--b); color: var(--w); overflow-x: hidden; padding-top: 60px; } /* Added padding-top to account for fixed ticker */

        /* TICKER - Fixed at top */
        .ticker { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #000; border-bottom: 1px solid #fff; display: flex; align-items: center; overflow: hidden; z-index: 100; pointer-events: none; }
        .ticker-track { display: flex; white-space: nowrap; animation: scroll 22s linear infinite; }
        .ticker-track span { padding-right: 80px; font: 700 24px 'Inter', Arial; text-transform: uppercase; letter-spacing: 1.5px; }
        @keyframes scroll { to { transform: translateX(-50%); } }

        /* HERO - Starts exactly at the bottom of the ticker */
        .hero { height: 100svh; position: relative; overflow: hidden; }
        .hero-bg { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        
        /* LOGO - Placed over hero */
        .logo-container { 
            position: absolute; 
            top: 40px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 50; 
            width: 80vw; 
            max-width: 800px;
        }
        .logo-container img { width: 100%; display: block; filter: drop-shadow(0 20px 40px rgba(0,0,0,.35)); }

        /* FOOTER */
        .footer { background: var(--s); color: #000; padding: 100px 0; text-transform: uppercase; letter-spacing: 1px; }
        /* ... (rest of footer styles same as before) ... */
    </style>
</head>

<body>
    <div class="ticker" aria-hidden="true">
        <div class="ticker-track">
            <span>AUTHENTIC AÇAÍ</span><span>FROZEN YOGURT</span><span>PREMIUM TOPPINGS</span><span>ENERGISING SMOOTHIES</span><span>SPECIALTY COFFEE</span>
        </div>
    </div>

    <section class="hero">
        <a href="/" class="logo-container">
            <img src="images/acai-life-logo-hero.webp" alt="Acai Life Logo">
        </a>
        <img src="/images/acai-life-index-image.webp" class="hero-bg" alt="Fresh acai bowl" fetchpriority="high">
    </section>

    </body>
</html>
