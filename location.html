    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; 
            margin: 0;
            background: #111111;
        }

        body { 
            font: 16px 'Inter', Arial, sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Section: Stays at the top */
        .top-content { flex-shrink: 0; }
        
        .ticker { height: 60px; border-bottom: 1px solid #fff; display: flex; align-items: center; overflow: hidden; }
        .track { display: flex; white-space: nowrap; animation: scroll 22s linear infinite; }
        .track span { padding-right: 80px; font: 700 24px 'Inter'; text-transform: uppercase; }
        @keyframes scroll { to { transform: translateX(-50%); } }

        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 40px auto; width: 80vw; max-width: 800px; text-decoration: none; }
        .logo-container img { width: 100%; display: block; filter: drop-shadow(0 20px 40px rgba(0,0,0,.35)); }
        .logo-secondary { max-width: 400px; }

        /* Map Section: flex-grow: 1 makes it fill the rest of the viewport height */
        .page-wrapper { 
            width: 100%; 
            flex-grow: 1; 
            min-height: 0; /* Important for flex-grow to work properly with iframes */
            display: flex;
        }

        .map { 
            width: 100%; 
            height: 100%; 
            border: none; 
            filter: grayscale(1) invert(0.9); 
            display: block;
        }

        /* Footer */
        .footer { background-color: #f5f1ea; color: #111111; padding: 100px 0; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
        .footer-inner { max-width: 1200px; margin: auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .nav { display: flex; flex-direction: column; gap: 18px; }
        .footer a { color: inherit; text-decoration: none; }
        .nav a { font: 700 28px 'Inter'; }
        .nav a:hover { opacity: .5; }
        .f-right { max-width: 420px; margin-left: auto; text-align: right; display: flex; flex-direction: column; justify-content: space-between; }
        .f-info h2 { font-size: 20px; margin-bottom: 18px; }
        .f-info p { font-size: 14px; line-height: 1.8; margin-bottom: 18px; }
        .f-social { display: flex; justify-content: flex-end; gap: 28px; margin-top: 30px; }
        .f-social a { font-size: 34px; transition: 0.25s; }
        .f-social a:hover { transform: translateY(-3px); opacity: .5; }

        @media(max-width: 768px) {
            .logo-container { margin: 20px auto; }
            .footer-inner { grid-template-columns: 1fr; gap: 40px; padding: 0 20px; }
            .f-right { text-align: left; margin: 0; }
            .f-social { justify-content: flex-start; }
        }
    </style>
</head>
