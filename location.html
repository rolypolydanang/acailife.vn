<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Location | Acai Life</title>
    
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <style>
        :root { --bg: #111111; --text: #ffffff; --accent: #f5f1ea; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            margin: 0; 
            min-height: 100dvh; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', Arial, sans-serif;
        }
        
        body { display: flex; flex-direction: column; }

        /* 1. TICKER */
        .ticker { height: 60px; flex-shrink: 0; background: #000; border-bottom: 1px solid #fff; display: flex; align-items: center; overflow: hidden; }
        .track { display: flex; white-space: nowrap; animation: scroll 20s linear infinite; }
        .track span { padding-right: 80px; font-weight: 700; font-size: 24px; text-transform: uppercase; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* 2. MAIN CONTENT */
        .page-wrapper { display: flex; flex-direction: column; flex: 1 0 auto; width: 100%; }
        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 25px; padding: 40px 0; width: 90vw; max-width: 800px; text-decoration: none; margin: 0 auto; }
        
        /* Logos updated to use percentage for mobile scaling + max-width for desktop */
        .logo-main { width: 85%; max-width: 425px; height: auto; display: block; filter: drop-shadow(0 20px 40px rgba(0,0,0,.35)); }
        .logo-secondary { width: 50%; max-width: 255px; height: auto; display: block; }
        
        .map-container { width: 100%; height: 400px; }
        @media(min-width: 575px) { .map-container { height: 575px; } }
        .map { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(0.9); display: block; }

        /* 3. UNIFIED FOOTER */
        .footer { background-color: var(--accent); color: #111111; padding: 100px 0; text-transform: uppercase; letter-spacing: 1px; width: 100%; flex-shrink: 0; }
        .footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .footer a { color: inherit; text-decoration: none; transition: opacity 0.25s ease; }
        .footer a:hover { opacity: .5; }
        
        .nav { display: flex; flex-direction: column; gap: 0; }
        .nav a { font: 700 28px 'Inter'; display: block; padding: 5px 0; }
        
        .f-right { max-width: 420px; margin-left: auto; text-align: right; }
        .f-info h2 { font-size: 20px; margin-bottom: 18px; }
        .f-info p { font-size: 14px; line-height: 1.8; margin-bottom: 18px; }
        .f-social { display: flex; justify-content: flex-end; gap: 28px; margin-top: 30px; }
        .f-social a { font-size: 34px; padding: 12px; }

        @media(max-width: 768px) {
            .footer-inner { grid-template-columns: 1fr; gap: 40px; padding: 0 20px; }
            .f-right { text-align: left; margin: 0; }
            .f-social { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <header class="ticker" aria-hidden="true">
        <div class="track" id="ticker-track">
            <span>AUTHENTIC AÇAÍ</span><span>FROZEN YOGURT</span><span>PREMIUM TOPPINGS</span><span>ENERGISING SMOOTHIES</span><span>SPECIALTY COFFEE</span>
        </div>
    </header>

    <main class="page-wrapper">
        <a href="/" class="logo-container">
            <img src="/images/acai-life-logo-hero.webp" alt="Acai Life Logo" class="logo-main">
            <img src="/images/logo-secondary-location.webp" alt="Location" class="logo-secondary">
        </a>
        <div class="map-container">
            <iframe class="map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3834.320204336659!2d108.24251867646417!3d16.0488652399801!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31421745ba6fd893%3A0x433f0e01c6182429!2sAcai%20Life%20-%20Acai%20Bowls%20%26%20Frozen%20Yogurt!5e0!3m2!1sen!2smy!4v1783250058634!5m2!1sen!2smy" allowfullscreen="" loading="lazy" title="Location Map"></iframe>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <nav class="nav">
                <a href="#">MENU</a>
                <a href="location.html">LOCATION</a>
                <a href="about.html">ABOUT</a>
                <a href="#">WHOLESALE</a>
                <a href="#">BLOG</a>
            </nav>
            <div class="f-right">
                <div class="f-info">
                    <a href="/"><h2>ACAI LIFE - ACAI BOWLS & FROZEN YOGURT</h2></a>
                    <p>05 AN THƯỢNG 6, BẮC MỸ PHÚ,<br>NGŨ HÀNH SƠN, ĐÀ NẴNG 550000, VIETNAM</p>
                    <p>MON-SUN: 10:00 - 22:00</p>
                    <p><a href="tel:+84394303001">+84 394 303 001</a><br>
                    <a href="mailto:acailife.vn@gmail.com">ACAILIFE.VN@GMAIL.COM</a></p>
                </div>
                <div class="f-social">
                    <a href="https://www.facebook.com/acailifevn" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/acailife.vn" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@acailife.vn" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="https://maps.app.goo.gl/8EcqxysxVB3U9FvW9" target="_blank" aria-label="Location Map"><i class="fa-solid fa-location-dot"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const track = document.getElementById('ticker-track');
        const content = track.innerHTML;
        track.innerHTML += content + content;
    </script>
</body>
</html>
